<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>❤</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #08000d; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  #btn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,80,100,0.25);
    color: rgba(255,180,190,0.7); font-family: Georgia, serif; font-size: 13px;
    letter-spacing: 2px; padding: 10px 28px; border-radius: 40px; cursor: pointer;
    transition: all 0.3s ease; text-transform: lowercase;
  }
  #btn:hover { background: rgba(255,50,80,0.12); border-color: rgba(255,80,100,0.5); color: rgba(255,200,210,0.95); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="btn">снова</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, threads = [], particles = [], raf, t0;
const N_OUTLINE = 220;
const N_FILL = 600;
const TOTAL_DUR = 4200;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function heart(t, s, cx, cy) {
  const x =  16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return { x: cx + x * s, y: cy + y * s };
}

function insideHeart(px, py, s, cx, cy) {
  const x = (px - cx) / s;
  const y = (py - cy) / s;
  const v = Math.pow(x*x + y*y - 1, 3) - x*x * y*y*y;
  return v <= 0;
}

function randomInsideHeart(s, cx, cy) {
  const bx = s * 17, by = s * 15;
  let px, py, attempts = 0;
  do {
    px = cx + (Math.random() * 2 - 1) * bx;
    py = cy + (Math.random() * 2 - 1) * by;
    attempts++;
  } while (!insideHeart(px, py, s, cx, cy) && attempts < 200);
  return { x: px, y: py };
}

function edge() {
  const s = Math.floor(Math.random() * 4);
  if (s === 0) return { x: Math.random() * W, y: -30 };
  if (s === 1) return { x: W + 30,            y: Math.random() * H };
  if (s === 2) return { x: Math.random() * W, y: H + 30 };
  return          { x: -30,                   y: Math.random() * H };
}

function bezier(p0, p1, p2, p3, t) {
  const m = 1 - t;
  return {
    x: m*m*m*p0.x + 3*m*m*t*p1.x + 3*m*t*t*p2.x + t*t*t*p3.x,
    y: m*m*m*p0.y + 3*m*m*t*p1.y + 3*m*t*t*p2.y + t*t*t*p3.y
  };
}

function ease(x) {
  return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
}

function easeOut(x) {
  return 1 - Math.pow(1 - x, 3);
}

function init() {
  cancelAnimationFrame(raf);
  threads = [];
  particles = [];

  const s  = Math.min(W, H) * 0.037;
  const cx = W / 2;
  const cy = H / 2 + s * 0.6;

  for (let i = 0; i < N_OUTLINE; i++) {
    const angle  = (i / N_OUTLINE) * Math.PI * 2;
    const target = heart(angle, s, cx, cy);
    const from   = edge();
    const c1 = { x: from.x + (Math.random()-.5)*W*.7, y: from.y + (Math.random()-.5)*H*.7 };
    const c2 = { x: target.x + (Math.random()-.5)*s*4, y: target.y + (Math.random()-.5)*s*4 };
    const hue  = 340 + (Math.random()-.5)*35;
    const lit  = 48  + Math.random()*35;
    const alp  = 0.5 + Math.random()*0.5;
    const lw   = 0.35 + Math.random()*1.1;
    const delay = Math.random() * 1400;
    const dur   = TOTAL_DUR - delay + (Math.random()*500-250);
    threads.push({ from, target, c1, c2, hue, lit, alp, lw, delay, dur });
  }

  for (let i = 0; i < N_FILL; i++) {
    const target = randomInsideHeart(s, cx, cy);
    const startAngle = Math.random() * Math.PI * 2;
    const startR = (0.3 + Math.random() * 0.7) * s * 16;
    let from;
    if (Math.random() < 0.4) {
      from = edge();
    } else {
      from = {
        x: cx + Math.cos(startAngle) * startR,
        y: cy + Math.sin(startAngle) * startR
      };
    }
    const c1 = { x: from.x + (Math.random()-.5)*W*.5, y: from.y + (Math.random()-.5)*H*.5 };
    const c2 = { x: target.x + (Math.random()-.5)*s*6, y: target.y + (Math.random()-.5)*s*6 };
    const hue  = 320 + Math.random() * 50;
    const lit  = 35  + Math.random() * 45;
    const alp  = 0.25 + Math.random() * 0.55;
    const lw   = 0.2  + Math.random() * 0.9;
    const delay = 900 + Math.random() * 2200;
    const dur   = 800 + Math.random() * 1200;
    particles.push({ from, target, c1, c2, hue, lit, alp, lw, delay, dur });
  }

  t0 = performance.now();
  loop();
}

function loop() {
  const now = performance.now();
  const el  = now - t0;

  ctx.fillStyle = 'rgba(8, 0, 13, 0.13)';
  ctx.fillRect(0, 0, W, H);

  let allDone = true;

  for (const th of threads) {
    const local = el - th.delay;
    if (local <= 0) { allDone = false; continue; }
    const prog = Math.min(local / th.dur, 1);
    if (prog < 1) allDone = false;
    const ep   = ease(prog);
    const prev = ease(Math.max(0, prog - 0.055));
    const cur  = bezier(th.from, th.c1, th.c2, th.target, ep);
    const prv  = bezier(th.from, th.c1, th.c2, th.target, prev);
    const fadeIn = Math.min(1, prog * 10);
    ctx.beginPath();
    ctx.moveTo(prv.x, prv.y);
    ctx.lineTo(cur.x, cur.y);
    ctx.strokeStyle = `hsla(${th.hue}, 82%, ${th.lit}%, ${th.alp * fadeIn})`;
    ctx.lineWidth   = th.lw;
    ctx.lineCap     = 'round';
    ctx.stroke();
  }

  for (const th of particles) {
    const local = el - th.delay;
    if (local <= 0) { allDone = false; continue; }
    const prog = Math.min(local / th.dur, 1);
    if (prog < 1) allDone = false;
    const ep   = easeOut(prog);
    const prev = easeOut(Math.max(0, prog - 0.08));
    const cur  = bezier(th.from, th.c1, th.c2, th.target, ep);
    const prv  = bezier(th.from, th.c1, th.c2, th.target, prev);
    const fadeIn  = Math.min(1, prog * 8);
    const fadeOut = prog > 0.85 ? 1 - (prog - 0.85) / 0.15 * 0.3 : 1;
    ctx.beginPath();
    ctx.moveTo(prv.x, prv.y);
    ctx.lineTo(cur.x, cur.y);
    ctx.strokeStyle = `hsla(${th.hue}, 85%, ${th.lit}%, ${th.alp * fadeIn * fadeOut})`;
    ctx.lineWidth   = th.lw;
    ctx.lineCap     = 'round';
    ctx.stroke();
  }

  if (el > 1800) {
    const s  = Math.min(W, H) * 0.037;
    const cx = W / 2;
    const cy = H / 2 + s * 0.6;
    const pulse = 0.5 + 0.5 * Math.sin(el * 0.0018);
    const glowProgress = Math.min(1, (el - 1800) / 1500);
    const grad = ctx.createRadialGradient(cx, cy - s*1.5, 0, cx, cy, s * 13);
    grad.addColorStop(0,   `rgba(255, 60, 100, ${0.07 * glowProgress * pulse})`);
    grad.addColorStop(0.5, `rgba(200, 20, 60,  ${0.05 * glowProgress * pulse})`);
    grad.addColorStop(1,   `rgba(100, 0, 30,   0)`);
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i <= 300; i++) {
      const p = heart((i / 300) * Math.PI * 2, s, cx, cy);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.clip();
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (!allDone || el < TOTAL_DUR + 1200) {
    raf = requestAnimationFrame(loop);
  } else {
    glowFinal();
  }
}

function glowFinal() {
  const s  = Math.min(W, H) * 0.037;
  const cx = W / 2;
  const cy = H / 2 + s * 0.6;
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.shadowColor = '#ff2255';
  ctx.shadowBlur  = 40;
  ctx.strokeStyle = '#ff4477';
  ctx.lineWidth   = s * 0.28;
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const p = heart((i / 300) * Math.PI * 2, s, cx, cy);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

window.addEventListener('resize', () => { resize(); init(); });
document.getElementById('btn').addEventListener('click', init);
resize();
init();
</script>
</body>
</html>
